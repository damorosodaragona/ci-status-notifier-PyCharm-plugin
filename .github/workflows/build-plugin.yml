name: Build Plugin

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build plugin ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ci-status-notifier-plugin
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true

      - name: Add build summary
        if: always()
        shell: bash
        run: |
          echo "## 📦 Build plugin" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ref: \`${{ github.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if compgen -G "build/distributions/*.zip" > /dev/null; then
            echo "### ✅ Plugin ZIP produced" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            for file in build/distributions/*.zip; do
              size=$(du -h "$file" | cut -f1)
              echo "- \`$file\` ($size)" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "### ❌ No plugin ZIP was produced" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 📦 Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open this workflow run to download \`ci-status-notifier-plugin\`](../../actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
