name: PR Smoke Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-smoke-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  controlled-smoke-tests:
    name: Controlled smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Show Docker info
        run: |
          docker --version
          docker info

      - name: Run controlled smoke tests
        env:
          JCN_CONTAINER_SMOKE_ENABLED: true
        run: ./gradlew test --tests "*SmokeTest"

      - name: Add smoke test summary
        if: always()
        shell: bash
        run: |
          echo "## 🧪 Controlled smoke tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Command: \`./gradlew test --tests \"*SmokeTest\"\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker-backed smoke tests enabled: \`JCN_CONTAINER_SMOKE_ENABLED=true\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          RESULT_FILES=$(find build/test-results/test -maxdepth 1 -type f -name "TEST-*.xml" 2>/dev/null | sort || true)

          if [ -z "$RESULT_FILES" ]; then
            echo "⚠️ No JUnit result files found." >> "$GITHUB_STEP_SUMMARY"
          else
            TOTAL_TESTS=0
            TOTAL_FAILURES=0
            TOTAL_ERRORS=0
            TOTAL_SKIPPED=0

            for file in $RESULT_FILES; do
              TESTS=$(grep -o 'tests="[0-9]*"' "$file" | head -n1 | cut -d'"' -f2)
              FAILURES=$(grep -o 'failures="[0-9]*"' "$file" | head -n1 | cut -d'"' -f2)
              ERRORS=$(grep -o 'errors="[0-9]*"' "$file" | head -n1 | cut -d'"' -f2)
              SKIPPED=$(grep -o 'skipped="[0-9]*"' "$file" | head -n1 | cut -d'"' -f2)
              TOTAL_TESTS=$((TOTAL_TESTS + ${TESTS:-0}))
              TOTAL_FAILURES=$((TOTAL_FAILURES + ${FAILURES:-0}))
              TOTAL_ERRORS=$((TOTAL_ERRORS + ${ERRORS:-0}))
              TOTAL_SKIPPED=$((TOTAL_SKIPPED + ${SKIPPED:-0}))
            done

            echo "### Results" >> "$GITHUB_STEP_SUMMARY"
            echo "- Tests: **$TOTAL_TESTS**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Failures: **$TOTAL_FAILURES**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Errors: **$TOTAL_ERRORS**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Skipped: **$TOTAL_SKIPPED**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            if [ "$TOTAL_FAILURES" != "0" ] || [ "$TOTAL_ERRORS" != "0" ]; then
              echo "### ❌ Failure details" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo '```xml' >> "$GITHUB_STEP_SUMMARY"
              grep -R "<failure\|<error" build/test-results/test/TEST-*.xml | head -n 40 >> "$GITHUB_STEP_SUMMARY" || true
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            else
              echo "### ✅ All smoke tests passed" >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### JUnit result files" >> "$GITHUB_STEP_SUMMARY"
            for file in $RESULT_FILES; do
              echo "- \`$file\`" >> "$GITHUB_STEP_SUMMARY"
            done
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 📦 Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open this workflow run to download \`smoke-test-reports\`](../../actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: |
            build/reports/tests/test/
            build/test-results/test/
          if-no-files-found: ignore
