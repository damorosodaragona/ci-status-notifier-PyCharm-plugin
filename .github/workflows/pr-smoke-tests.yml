name: PR Smoke Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-smoke-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  controlled-smoke-tests:
    name: Controlled smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Show Docker info
        run: |
          docker --version
          docker info

      - name: Run controlled smoke tests
        env:
          JCN_CONTAINER_SMOKE_ENABLED: true
        run: ./gradlew test --tests "*SmokeTest"