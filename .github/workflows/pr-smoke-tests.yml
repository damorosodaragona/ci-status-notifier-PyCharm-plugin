name: PR Smoke Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-smoke-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  controlled-smoke-tests:
    name: Controlled smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Show Docker info
        run: |
          docker --version
          docker info

      - name: Run controlled smoke tests
        env:
          JCN_CONTAINER_SMOKE_ENABLED: true
        run: ./gradlew test --tests "*SmokeTest"

      - name: Upload smoke test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: |
            build/reports/tests/test/
            build/test-results/test/
          if-no-files-found: ignore

      - name: Smoke test summary
        if: always()
        run: |
          echo "## Controlled smoke tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Gradle HTML report is available in the artifact \`smoke-test-reports\`." >> $GITHUB_STEP_SUMMARY
          echo "- JUnit XML results are available in \`build/test-results/test/\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f build/test-results/test/TEST-com.damorosodaragona.jenkinsnotifier.CiStatusConfigurableContainerSmokeTest.xml ]; then
            echo "### Smoke test result file found" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`xml" >> $GITHUB_STEP_SUMMARY
            grep -E "<testsuite|<failure|<error|<skipped" build/test-results/test/TEST-com.damorosodaragona.jenkinsnotifier.CiStatusConfigurableContainerSmokeTest.xml >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "Smoke test XML result file not found." >> $GITHUB_STEP_SUMMARY
          fi