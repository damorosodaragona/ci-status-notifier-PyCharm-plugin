name: PR Smoke Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-smoke-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  controlled-smoke-tests:
    name: Controlled smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Show Docker info
        run: |
          docker --version
          docker info

      - name: Run controlled smoke tests
        env:
          JCN_CONTAINER_SMOKE_ENABLED: true
        run: ./gradlew test --tests "*SmokeTest"

      - name: Add smoke test summary
        if: always()
        shell: bash
        run: |
          echo "## Controlled smoke tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Command: \`./gradlew test --tests \"*SmokeTest\"\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker-backed smoke tests enabled: \`JCN_CONTAINER_SMOKE_ENABLED=true\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -d build/test-results/test ]; then
            echo "### JUnit result files" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            find build/test-results/test -maxdepth 1 -type f -name "TEST-*.xml" | sort | while read -r file; do
              echo "- \`$file\`" >> "$GITHUB_STEP_SUMMARY"
            done
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No JUnit result directory was produced." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if grep -R "<failure\|<error" build/test-results/test/TEST-*.xml >/dev/null 2>&1; then
            echo "### Failures / errors" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```xml' >> "$GITHUB_STEP_SUMMARY"
            grep -R "<failure\|<error" build/test-results/test/TEST-*.xml | head -n 40 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Gradle HTML report and JUnit XML files are uploaded as the \`smoke-test-reports\` artifact." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-reports
          path: |
            build/reports/tests/test/
            build/test-results/test/
          if-no-files-found: ignore
