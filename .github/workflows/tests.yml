name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - '**'

permissions:
  contents: read
  checks: write
  pull-requests: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kotlin-tests:
    name: Kotlin/JUnit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run tests and verify plugin compatibility
        run: ./gradlew clean test verifyPlugin

      - name: Add test and verifier summary
        if: always()
        shell: bash
        run: |
          echo "## Kotlin/JUnit tests and plugin verification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Command: \`./gradlew clean test verifyPlugin\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -d build/test-results/test ]; then
            echo "### JUnit result files" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            find build/test-results/test -maxdepth 1 -type f -name "TEST-*.xml" | sort | while read -r file; do
              echo "- \`$file\`" >> "$GITHUB_STEP_SUMMARY"
            done
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No JUnit result directory was produced." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if grep -R "<failure\|<error" build/test-results/test/TEST-*.xml >/dev/null 2>&1; then
            echo "### Test failures / errors" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```xml' >> "$GITHUB_STEP_SUMMARY"
            grep -R "<failure\|<error" build/test-results/test/TEST-*.xml | head -n 40 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -d build/reports/pluginVerifier ]; then
            echo "### Plugin verifier" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Plugin verifier report directory was produced: \`build/reports/pluginVerifier/\`." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No plugin verifier report directory was produced." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Full Gradle test and verifier reports are uploaded as workflow artifacts." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          if-no-files-found: ignore

      - name: Upload plugin verifier report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-verifier-report
          path: build/reports/pluginVerifier/
          if-no-files-found: ignore
