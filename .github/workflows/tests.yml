name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - '**'

permissions:
  contents: read
  checks: write
  pull-requests: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest

    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
      docs_changed: ${{ steps.detect.outputs.docs_changed }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect docs-only changes
        id: detect
        uses: ./.github/actions/detect-docs-only

  kotlin-tests:
    name: Kotlin/JUnit tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run tests and verify plugin compatibility
        run: ./gradlew clean test verifyPlugin

      - name: Add test and verifier summary
        if: always()
        shell: bash
        run: |
          echo "## 🧪 Kotlin/JUnit tests and plugin verification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Command: \`./gradlew clean test verifyPlugin\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          RESULT_FILES=$(find build/test-results/test -maxdepth 1 -type f -name "TEST-*.xml" 2>/dev/null | sort || true)

          if [ -z "$RESULT_FILES" ]; then
            echo "⚠️ No JUnit result files found." >> "$GITHUB_STEP_SUMMARY"
          else
            TOTAL_TESTS=0
            TOTAL_FAILURES=0
            TOTAL_ERRORS=0
            TOTAL_SKIPPED=0

            for file in $RESULT_FILES; do
              TESTS=$(grep -o 'tests="[0-9]*"' "$file" | head -n1 | cut -d'"' -f2)
              FAILURES=$(grep -o 'failures="[0-9]*"' "$file" | head -n1 | cut -d'"' -f2)
              ERRORS=$(grep -o 'errors="[0-9]*"' "$file" | head -n1 | cut -d'"' -f2)
              SKIPPED=$(grep -o 'skipped="[0-9]*"' "$file" | head -n1 | cut -d'"' -f2)
              TOTAL_TESTS=$((TOTAL_TESTS + ${TESTS:-0}))
              TOTAL_FAILURES=$((TOTAL_FAILURES + ${FAILURES:-0}))
              TOTAL_ERRORS=$((TOTAL_ERRORS + ${ERRORS:-0}))
              TOTAL_SKIPPED=$((TOTAL_SKIPPED + ${SKIPPED:-0}))
            done

            echo "### Test results" >> "$GITHUB_STEP_SUMMARY"
            echo "- Tests: **$TOTAL_TESTS**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Failures: **$TOTAL_FAILURES**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Errors: **$TOTAL_ERRORS**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Skipped: **$TOTAL_SKIPPED**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            if [ "$TOTAL_FAILURES" != "0" ] || [ "$TOTAL_ERRORS" != "0" ]; then
              echo "### ❌ Test failure details" >> "$GITHUB_STEP_SUMMARY"
              echo '```xml' >> "$GITHUB_STEP_SUMMARY"
              grep -R "<failure\|<error" build/test-results/test/TEST-*.xml | head -n 40 >> "$GITHUB_STEP_SUMMARY" || true
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            else
              echo "### ✅ All JUnit tests passed" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Plugin verifier" >> "$GITHUB_STEP_SUMMARY"
          if [ -d build/reports/pluginVerifier ]; then
            echo "- Report directory produced: \`build/reports/pluginVerifier/\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Verified targets: **PyCharm Community 2023.3.7**, **PyCharm Professional 2023.3.7**, **PyCharm Professional 2026.1**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ⚠️ No plugin verifier report directory was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 📦 Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open this workflow run to download \`test-report\` and \`plugin-verifier-report\`](../../actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          if-no-files-found: ignore

      - name: Upload plugin verifier report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-verifier-report
          path: build/reports/pluginVerifier/
          if-no-files-found: ignore
